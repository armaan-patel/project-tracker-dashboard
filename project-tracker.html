<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --green:#22c55e;--green-lt:#f0fdf4;
  --red:#ef4444;--red-lt:#fef2f2;
  --amber:#f59e0b;--amber-lt:#fffbeb;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --sh-lg:0 10px 25px rgba(0,0,0,.12),0 4px 6px rgba(0,0,0,.05);
  --r:10px;--r-sm:6px;
  --chart-grid:#f1f5f9
}
body.dark{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --blue-lt:rgba(59,130,246,.15);
  --green-lt:rgba(34,197,94,.15);
  --red-lt:rgba(239,68,68,.15);
  --amber-lt:rgba(245,158,11,.15);
  --sh:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --sh-md:0 4px 6px rgba(0,0,0,.35),0 2px 4px rgba(0,0,0,.25);
  --sh-lg:0 10px 25px rgba(0,0,0,.5),0 4px 6px rgba(0,0,0,.3);
  --chart-grid:#334155
}
body{transition:background .25s,color .25s}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
#app{max-width:1140px;margin:0 auto;padding:28px 20px}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
.app-title-block{display:flex;flex-direction:column;gap:4px}
.app-title{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em}
.app-title span{color:var(--blue)}
.app-subtitle{font-size:.82rem;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:8px}
.app-subtitle a{color:var(--text3);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .15s}
.app-subtitle a:hover{color:var(--blue)}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.theme-btn{width:38px;height:38px;border-radius:var(--r-sm);background:var(--surface);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;box-shadow:var(--sh);flex-shrink:0}
.theme-btn:hover{border-color:var(--blue);color:var(--blue)}
.color-btn-dot{width:18px;height:18px;border-radius:50%;background:var(--blue);transition:background .2s;pointer-events:none}
.color-popover{position:absolute;top:calc(100% + 10px);right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-lg);z-index:600;width:220px}
.color-popover.hidden{display:none}
.cpop-label{font-size:.7rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.color-swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;position:relative;box-shadow:var(--sh)}
.color-swatch:hover{transform:scale(1.18)}
.color-swatch.sel::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.cpop-divider{border:none;border-top:1px solid var(--border);margin-bottom:12px}
.cpop-custom{display:flex;align-items:center;gap:10px}
.cpop-custom label{font-size:.78rem;font-weight:600;color:var(--text2)}
.cpop-custom input[type=color]{width:38px;height:30px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;padding:2px 3px;background:var(--surface)}

/* STATS BAR */
.stats-bar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:50px;background:var(--surface);border:2px solid var(--border);cursor:pointer;font-size:.875rem;font-weight:600;color:var(--text2);transition:all .15s;user-select:none;box-shadow:var(--sh)}
.stat-chip:hover{border-color:var(--blue);color:var(--blue)}
.stat-chip.act{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}
.stat-chip.act-all{border-color:var(--text2);background:var(--surface2);color:var(--text)}
.stat-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:50px;font-size:.72rem;font-weight:700;padding:0 5px;background:var(--surface2);color:var(--text2);transition:all .15s}
.stat-chip.act .stat-count{background:rgba(255,255,255,.25);color:inherit}
.stat-chip.act-all .stat-count{background:var(--border);color:var(--text2)}
.chip-prog.act .stat-count{background:rgba(59,130,246,.2)}
.chip-done.act .stat-count{background:rgba(34,197,94,.2)}
.chip-unf.act .stat-count{background:rgba(239,68,68,.2)}

/* CONTROLS */
.controls{display:flex;gap:10px;margin-bottom:22px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:340px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:10px 12px 10px 34px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.875rem;background:var(--surface);color:var(--text);transition:border-color .15s;box-shadow:var(--sh)}
.search-input:focus{outline:none;border-color:var(--blue)}
.btn{padding:10px 16px;border-radius:var(--r-sm);font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 1px 3px rgba(59,130,246,.4)}
.btn-primary:hover{background:#2563eb}
.btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border);box-shadow:var(--sh)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red-lt);color:var(--red);border:1.5px solid #fca5a5}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:7px 12px;font-size:.8rem}

/* GRID */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.empty-state{grid-column:1/-1;text-align:center;padding:64px 20px;color:var(--text3)}
.empty-state h3{font-size:1.1rem;color:var(--text2);margin:12px 0 6px}
.empty-state p{font-size:.875rem}

/* CARD */
.project-card{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);padding:0;cursor:pointer;transition:all .15s;box-shadow:var(--sh);overflow:hidden}
.project-card:hover{border-color:var(--blue);box-shadow:var(--sh-md);transform:translateY(-2px)}
.card-accent{height:4px}
.card-accent-prog{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.card-accent-done{background:linear-gradient(90deg,var(--green),#4ade80)}
.card-accent-unf{background:linear-gradient(90deg,var(--red),#f87171)}
.card-body{padding:18px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-name{font-size:.975rem;font-weight:700;color:var(--text);line-height:1.3}
.pri-badge{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:50px;white-space:nowrap;flex-shrink:0}
.pri-High{background:var(--red-lt);color:var(--red)}
.pri-Medium{background:var(--amber-lt);color:#b45309}
.pri-Low{background:var(--green-lt);color:#15803d}
.card-desc{font-size:.82rem;color:var(--text2);margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.meta-tag{font-size:.78rem;color:var(--text3);display:flex;align-items:center;gap:4px}
.meta-tag.overdue{color:var(--red);font-weight:600}
.prog-bar-wrap{height:5px;background:var(--surface2);border-radius:50px;overflow:hidden;margin-bottom:6px}
.prog-bar-fill{height:100%;border-radius:50px;transition:width .3s}
.prog-fill-prog{background:var(--blue)}
.prog-fill-done{background:var(--green)}
.prog-fill-unf{background:var(--red)}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.st-badge{font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:50px;display:inline-flex;align-items:center;gap:4px}
.st-in-progress{background:var(--blue-lt);color:var(--blue)}
.st-completed{background:var(--green-lt);color:#15803d}
.st-unfinished{background:var(--red-lt);color:var(--red)}
.prog-pct{font-size:.75rem;color:var(--text3);font-weight:600}

/* DETAIL VIEW */
#detail-view{display:none}
#detail-view.vis{display:block;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:.875rem;color:var(--text2);cursor:pointer;background:none;border:none;padding:7px 10px;border-radius:var(--r-sm);transition:all .15s;font-weight:600;margin-bottom:20px}
.back-btn:hover{background:var(--surface2);color:var(--text)}

.detail-card{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);padding:24px;margin-bottom:18px;box-shadow:var(--sh)}
.detail-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.detail-title{font-size:1.55rem;font-weight:800;letter-spacing:-0.01em;line-height:1.2}
.detail-actions{display:flex;gap:8px;flex-shrink:0}
.detail-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.meta-block label{display:block;font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.meta-block .mv{font-size:.9rem;color:var(--text);font-weight:500}
.meta-block select{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.85rem;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit}
.meta-block select:focus{outline:none;border-color:var(--blue)}
.detail-desc{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:.875rem;color:var(--text2);line-height:1.6}

/* SECTION CARD */
.sec-card{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);padding:22px;margin-bottom:18px;box-shadow:var(--sh)}
.sec-title{font-size:.72rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.notes-ta{width:100%;min-height:120px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.9rem;font-family:inherit;color:var(--text);background:var(--surface2);resize:vertical;transition:all .15s;line-height:1.65}
.notes-ta:focus{outline:none;border-color:var(--blue);background:var(--surface)}
.notes-hint{font-size:.72rem;color:var(--text3);margin-top:6px}

/* CHART TABS */
.chart-tabs{display:flex;gap:3px;margin-bottom:18px;background:var(--surface2);padding:4px;border-radius:var(--r-sm);width:fit-content;flex-wrap:wrap}
.chart-tab{padding:8px 15px;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:5px}
.chart-tab:hover{color:var(--text)}
.chart-tab.act{background:var(--surface);color:var(--blue);box-shadow:var(--sh)}

/* PROGRESS CHART */
.big-prog-wrap{display:flex;align-items:center;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.big-prog-track{flex:1;min-width:180px;height:14px;background:var(--surface2);border-radius:50px;overflow:hidden}
.big-prog-fill{height:100%;border-radius:50px;transition:width .4s ease}
.big-prog-pct{font-size:2.2rem;font-weight:800;color:var(--text);min-width:72px;text-align:right;letter-spacing:-0.02em}
.slider-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.slider-row label{font-size:.82rem;color:var(--text2);font-weight:600}
input[type=range]{flex:1;min-width:120px;max-width:280px;accent-color:var(--blue);cursor:pointer}
.donut-wrap{display:flex;justify-content:center;margin-top:22px}
.donut-wrap canvas{max-width:200px;max-height:200px}

/* BURNDOWN */
.bd-controls{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end;padding:14px;background:var(--surface2);border-radius:var(--r-sm)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.75rem;font-weight:700;color:var(--text2)}
.fg input,.fg select{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.85rem;color:var(--text);background:var(--surface);min-width:90px;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
.bd-chart-wrap{position:relative;height:280px;margin-bottom:16px}
.bd-table{overflow:auto}
.bd-table table{width:100%;border-collapse:collapse;font-size:.83rem}
.bd-table th{padding:8px 12px;color:var(--text3);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);text-align:left;font-weight:700}
.bd-table td{padding:8px 12px;border-bottom:1px solid var(--surface2);color:var(--text2)}
.bd-table tr:last-child td{border-bottom:none}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:.82rem;line-height:1}
.del-btn:hover{background:var(--red-lt);color:var(--red)}

/* GANTT */
.gantt-add{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;padding:14px;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:14px}
.gantt-wrap{overflow-x:auto;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--surface)}
.gantt-head{display:flex;border-bottom:1px solid var(--border);background:var(--surface2);min-height:34px}
.gantt-lbl-col{min-width:170px;max-width:170px;padding:8px 12px;font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-right:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
.gantt-time-col{flex:1;position:relative;overflow:hidden;min-width:0}
.gantt-tick{position:absolute;top:0;height:100%;display:flex;align-items:center;padding-left:4px;font-size:.68rem;color:var(--text3);white-space:nowrap;pointer-events:none}
.gantt-tick::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--border)}
.gantt-row{display:flex;border-bottom:1px solid var(--surface2);min-height:42px;align-items:stretch}
.gantt-row:last-child{border-bottom:none}
.gantt-row-lbl{min-width:170px;max-width:170px;padding:8px 12px;font-size:.83rem;color:var(--text);border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;user-select:none}
.gantt-row-lbl:hover{background:var(--surface2)}
.gantt-row-lbl .chk{width:16px;height:16px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.65rem;background:var(--surface)}
.gantt-row-lbl .chk.chkd{background:var(--green);border-color:var(--green);color:#fff}
.gantt-row-track{flex:1;position:relative;min-width:0;overflow:hidden}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:.7rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;cursor:pointer;min-width:4px;transition:opacity .15s}
.gantt-bar:hover{opacity:.8}
.gantt-bar.active{background:var(--blue)}
.gantt-bar.done{background:var(--green)}
.today-ln{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.5;z-index:2;pointer-events:none}
.gantt-empty{padding:28px;text-align:center;color:var(--text3);font-size:.85rem}
.gantt-legend{display:flex;gap:14px;margin-top:10px;font-size:.75rem;color:var(--text3);flex-wrap:wrap;align-items:center}
.gantt-legend span{display:flex;align-items:center;gap:5px}
.leg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}

/* MILESTONES */
.ms-add{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.ms-prog-wrap{height:8px;background:var(--surface2);border-radius:50px;overflow:hidden;margin-bottom:16px;flex:1}
.ms-prog-fill{height:100%;background:var(--green);border-radius:50px;transition:width .4s}
.ms-prog-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ms-list{display:flex;flex-direction:column;gap:8px}
.ms-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface2);border-radius:var(--r-sm);border:1.5px solid transparent;transition:all .15s}
.ms-item.ms-done{background:var(--green-lt);border-color:#bbf7d0}
.ms-item:hover{border-color:var(--border)}
.ms-chk{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface);font-size:.7rem;color:#fff}
.ms-chk.chkd{background:var(--green);border-color:var(--green)}
.ms-lbl{flex:1;font-size:.875rem;font-weight:500}
.ms-item.ms-done .ms-lbl{text-decoration:line-through;color:var(--text3)}
.ms-date{font-size:.75rem;color:var(--text3)}
.ms-empty{text-align:center;color:var(--text3);padding:28px;font-size:.85rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--r);padding:28px;width:100%;max-width:520px;box-shadow:var(--sh-lg);max-height:92vh;overflow-y:auto}
.modal-title{font-size:1.2rem;font-weight:800;margin-bottom:22px;letter-spacing:-.01em}
.modal-form{display:flex;flex-direction:column;gap:15px}
.modal-form .fg input,.modal-form .fg select,.modal-form .fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.875rem;color:var(--text);background:var(--surface);font-family:inherit;transition:border-color .15s}
.modal-form .fg input:focus,.modal-form .fg select:focus,.modal-form .fg textarea:focus{outline:none;border-color:var(--blue)}
.modal-form .fg textarea{min-height:80px;resize:vertical;line-height:1.55}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:4px}

/* MISC */
@media(max-width:600px){
  .projects-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .app-title{font-size:1.4rem}
  .chart-tabs{width:100%}
  .chart-tab{flex:1;justify-content:center}
  .detail-meta{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">

<!-- LIST VIEW -->
<div id="list-view">
  <div class="app-header">
    <div class="app-title-block">
      <div class="app-title">Project <span>Tracker</span></div>
      <div class="app-subtitle">
        Made by: Armaan Patel &nbsp;·&nbsp;
        <a href="https://github.com/armaan-patel" target="_blank" rel="noopener">

          <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search projects..." oninput="renderList()">
    </div>
  </div>
  <div class="projects-grid" id="projects-grid"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <button class="back-btn" onclick="closeDetail()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    All Projects
  </button>
  <div class="detail-card" id="detail-header"></div>
  <div class="sec-card">
    <div class="sec-title">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Notes

    <div class="notes-hint" id="notes-hint">Changes save automatically</div>

  <div class="sec-card">
    <div class="sec-title">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress Tracking
    </div>
    <div class="chart-tabs" id="chart-tabs">
      <button class="chart-tab" data-chart="progress" onclick="setChart('progress')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        Progress
      </button>
      <button class="chart-tab" data-chart="burndown" onclick="setChart('burndown')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Burndown
      </button>
      <button class="chart-tab" data-chart="gantt" onclick="setChart('gantt')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10" width="12" height="3" rx="1"/><rect x="3" y="16" width="15" height="3" rx="1"/></svg>
        Gantt
      </button>
      <button class="chart-tab" data-chart="milestones" onclick="setChart('milestones')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Milestones
      </button>

    <div id="chart-area"></div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Project</div>
    <div class="modal-form">
      <div class="fg"><label>Project Name *</label><input type="text" id="fm-name" placeholder="e.g. Website Redesign"></div>
      <div class="fg"><label>Description</label><textarea id="fm-desc" placeholder="Brief description..."></textarea></div>
      <div class="form-row">
        <div class="fg"><label>Due Date</label><input type="date" id="fm-due"></div>
        <div class="fg"><label>Priority</label><select id="fm-pri"><option>High</option><option selected>Medium</option><option>Low</option></select></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Status</label><select id="fm-status"><option value="in-progress">In Progress</option><option value="completed">Completed</option><option value="unfinished">Unfinished</option></select></div>
        <div class="fg"><label>Associated With</label><input type="text" id="fm-assoc" placeholder="Person or organization"></div>
      </div>

        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
      </div>
    </div>
  </div>

</div><!-- #app -->

<script>
// ── STATE ──
let S = { projects:[], filter:'all', curId:null, activeChart:'progress' };
let notesTimer = null;
let CI = {}; // chart instances
let editId = null;
let accentColor = '#3b82f6';

const PRESETS = [
  {n:'Blue',    h:'#3b82f6'},{n:'Indigo',   h:'#6366f1'},
  {n:'Violet',  h:'#8b5cf6'},{n:'Pink',     h:'#ec4899'},
  {n:'Rose',    h:'#f43f5e'},{n:'Orange',   h:'#f97316'},
  {n:'Teal',    h:'#14b8a6'},{n:'Emerald',  h:'#10b981'},
  {n:'Cyan',    h:'#06b6d4'},{n:'Slate',    h:'#475569'}
];

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── STORAGE ──
function load(){
  try{ const d=localStorage.getItem('pt-v1'); if(d) S=JSON.parse(d); }catch(e){}
  S.projects=S.projects||[];
  S.filter=S.filter||'all';
  S.activeChart=S.activeChart||'progress';
}
function save(){ localStorage.setItem('pt-v1',JSON.stringify(S)); }

// ── UTILS ──
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtDate(d){
  if(!d) return '—';
  const dt=new Date(d+'T12:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function isOverdue(p){ return p.dueDate && new Date(p.dueDate+'T23:59:59')<new Date() && p.status!=='completed'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getP(id){ return S.projects.find(p=>p.id===id); }
function stLabel(s){ return s==='in-progress'?'● In Progress':s==='completed'?'✓ Completed':'⚠ Unfinished'; }
function counts(){
  return {
    all:S.projects.length,
    'in-progress':S.projects.filter(p=>p.status==='in-progress').length,
    completed:S.projects.filter(p=>p.status==='completed').length,
    unfinished:S.projects.filter(p=>p.status==='unfinished').length
  };
}
function filtered(){
  const q=(document.getElementById('search-input')||{}).value||'';
  const ql=q.toLowerCase();
  return S.projects.filter(p=>{
    const mf=S.filter==='all'||p.status===S.filter;
    const ms=!q||p.name.toLowerCase().includes(ql)||(p.description||'').toLowerCase().includes(ql)||(p.associatedWith||'').toLowerCase().includes(ql);
    return mf&&ms;
  });
}

// ── LIST ──
function renderList(){
  renderStats();
  renderGrid();
}
function renderStats(){
  const c=counts();
  const chips=[
    {k:'all',l:'All Projects',cls:'chip-all'},
    {k:'in-progress',l:'In Progress',cls:'chip-prog'},
    {k:'completed',l:'Completed',cls:'chip-done'},
    {k:'unfinished',l:'Unfinished',cls:'chip-unf'}
  ];
  document.getElementById('stats-bar').innerHTML=chips.map(ch=>{
    const isAct=S.filter===ch.k;
    return `<div class="stat-chip ${ch.cls} ${isAct?(ch.k==='all'?'act-all':'act'):''}" onclick="setFilter('${ch.k}')">
      ${ch.l}<span class="stat-count">${c[ch.k]}</span>
    </div>`;
  }).join('');
}
function renderGrid(){
  const ps=filtered();
  const el=document.getElementById('projects-grid');
  if(!ps.length){
    el.innerHTML=`<div class="empty-state">
      <svg width="44" height="44" fill="none" stroke="#cbd5e1" stroke-width="1.5" viewBox="0 0 24 24" style="display:block;margin:0 auto"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h3>${S.filter!=='all'?'No '+S.filter.replace('-',' ')+' projects':'No projects yet'}</h3>
      <p>${S.filter!=='all'?'Try "All Projects" or add a new one.':'Click "New Project" to get started.'}</p>
    </div>`;
    return;
  }
  el.innerHTML=ps.map(p=>{
    const pct=p.progress||0;
    const od=isOverdue(p);
    return `<div class="project-card" onclick="openDetail('${p.id}')">
      <div class="card-accent card-accent-${p.status==='in-progress'?'prog':p.status==='completed'?'done':'unf'}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${esc(p.name)}</div>
          <span class="pri-badge pri-${esc(p.priority||'Medium')}">${esc(p.priority||'Medium')}</span>
        </div>
        ${p.description?`<div class="card-desc">${esc(p.description)}</div>`:''}
        <div class="card-meta">
          ${p.dueDate?`<span class="meta-tag ${od?'overdue':''}">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${fmtDate(p.dueDate)}${od?' · Overdue':''}
          </span>`:''}
          ${p.associatedWith?`<span class="meta-tag">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ${esc(p.associatedWith)}
          </span>`:''}
        </div>
        <div class="prog-bar-wrap"><div class="prog-bar-fill prog-fill-${p.status==='completed'?'done':p.status==='unfinished'?'unf':'prog'}" style="width:${pct}%"></div></div>
        <div class="card-foot">
          <span class="st-badge st-${p.status}">${stLabel(p.status)}</span>
          <span class="prog-pct">${pct}%</span>
        </div>
      </div>
    </div>`;
  }).join('');
}
function setFilter(f){ S.filter=f; save(); renderList(); }

// ── MODAL ──
function openModal(id){
  editId=id||null;
  document.getElementById('modal-overlay').classList.remove('hidden');
  const p=id?getP(id):null;
  document.getElementById('modal-title').textContent=p?'Edit Project':'New Project';
  document.getElementById('fm-name').value=p?p.name:'';
  document.getElementById('fm-desc').value=p?p.description||'':'';
  document.getElementById('fm-due').value=p?p.dueDate||'':'';
  document.getElementById('fm-pri').value=p?p.priority||'Medium':'Medium';
  document.getElementById('fm-status').value=p?p.status:'in-progress';
  document.getElementById('fm-assoc').value=p?p.associatedWith||'':'';
  setTimeout(()=>document.getElementById('fm-name').focus(),50);
}
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOutside(e){ if(e.target.id==='modal-overlay') closeModal(); }
function saveProject(){
  const name=document.getElementById('fm-name').value.trim();
  if(!name){ document.getElementById('fm-name').focus(); document.getElementById('fm-name').style.borderColor='var(--red)'; return; }
  document.getElementById('fm-name').style.borderColor='';
  const d={
    name,
    description:document.getElementById('fm-desc').value.trim(),
    dueDate:document.getElementById('fm-due').value,
    priority:document.getElementById('fm-pri').value,
    status:document.getElementById('fm-status').value,
    associatedWith:document.getElementById('fm-assoc').value.trim()
  };
  if(editId){
    const i=S.projects.findIndex(p=>p.id===editId);
    if(i!==-1) Object.assign(S.projects[i],d);
  } else {
    S.projects.push({
      id:uid(),...d,
      notes:'',progress:0,
      milestones:[],ganttTasks:[],
      totalPoints:100,burndownLog:[],
      createdAt:new Date().toISOString().slice(0,10)
    });
  }
  save(); closeModal();
  if(editId&&S.curId===editId) renderDetail(editId);
  else renderList();
}

// ── DETAIL ──
function openDetail(id){
  S.curId=id;
  const p=getP(id);
  S.activeChart=p.activeChart||'progress';
  save();
  document.getElementById('list-view').style.display='none';
  const dv=document.getElementById('detail-view');
  dv.classList.add('vis');
  renderDetail(id);
}
function closeDetail(){
  S.curId=null; destroyCharts();
  document.getElementById('list-view').style.display='';
  document.getElementById('detail-view').classList.remove('vis');
  renderList();
}
function renderDetail(id){
  const p=getP(id); if(!p) return;
  const od=isOverdue(p);
  document.getElementById('detail-header').innerHTML=`
    <div class="detail-title-row">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="detail-title">${esc(p.name)}</div>
        <span class="pri-badge pri-${esc(p.priority||'Medium')}">${esc(p.priority||'Medium')}</span>
        ${od?'<span class="st-badge st-unfinished">⚠ Overdue</span>':''}
      </div>
      <div class="detail-actions">
        <button class="btn btn-secondary btn-sm" onclick="openModal('${id}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit
        </button>
        <button class="btn btn-danger btn-sm" onclick="delProject('${id}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> Delete
        </button>
      </div>
    </div>
    <div class="detail-meta">
      <div class="meta-block">
        <label>Status</label>
        <select onchange="updateStatus('${id}',this.value)">
          <option value="in-progress" ${p.status==='in-progress'?'selected':''}>In Progress</option>
          <option value="completed" ${p.status==='completed'?'selected':''}>Completed</option>
          <option value="unfinished" ${p.status==='unfinished'?'selected':''}>Unfinished</option>
        </select>
      </div>
      <div class="meta-block"><label>Due Date</label><div class="mv">${fmtDate(p.dueDate)}</div></div>
      <div class="meta-block"><label>Associated With</label><div class="mv">${esc(p.associatedWith)||'—'}</div></div>
      <div class="meta-block"><label>Created</label><div class="mv">${fmtDate(p.createdAt)}</div></div>
    </div>
    ${p.description?`<div class="detail-desc">${esc(p.description)}</div>`:''}
  `;
  document.getElementById('notes-ta').value=p.notes||'';
  document.getElementById('notes-hint').textContent='Changes save automatically';
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.toggle('act',t.dataset.chart===S.activeChart));
  renderChartArea(p);
}
function updateStatus(id,s){
  const p=getP(id); if(p){ p.status=s; save(); renderDetail(id); }
}
function delProject(id){
  const p=getP(id); if(!p) return;
  if(confirm(`Delete "${p.name}"? This cannot be undone.`)){
    S.projects=S.projects.filter(pr=>pr.id!==id);
    save(); closeDetail();
  }
}

// ── NOTES ──
function debounceSaveNotes(){
  clearTimeout(notesTimer);
  document.getElementById('notes-hint').textContent='Saving...';
  notesTimer=setTimeout(()=>{
    const p=getP(S.curId);
    if(p){ p.notes=document.getElementById('notes-ta').value; save(); }
    document.getElementById('notes-hint').textContent='Saved ✓';
    setTimeout(()=>{ const h=document.getElementById('notes-hint'); if(h) h.textContent='Changes save automatically'; },2000);
  },700);
}

// ── CHARTS ──
function setChart(type){
  const p=getP(S.curId); if(!p) return;
  S.activeChart=type; p.activeChart=type; save();
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.toggle('act',t.dataset.chart===type));
  destroyCharts();
  renderChartArea(p);
}
function destroyCharts(){
  Object.values(CI).forEach(c=>{ try{c.destroy();}catch(e){} });
  CI={};
}
function renderChartArea(p){
  destroyCharts();
  const area=document.getElementById('chart-area');
  switch(S.activeChart){
    case 'progress': drawProgress(p,area); break;
    case 'burndown': drawBurndown(p,area); break;
    case 'gantt': drawGanttArea(p,area); break;
    case 'milestones': drawMilestones(p,area); break;
  }
}

// ── PROGRESS ──
function drawProgress(p,area){
  const pct=p.progress||0;
  const clr=p.status==='completed'?'var(--green)':p.status==='unfinished'?'var(--red)':'var(--blue)';
  area.innerHTML=`
    <div>
      <div class="big-prog-wrap">
        <div class="big-prog-track"><div class="big-prog-fill" id="bpf" style="width:${pct}%;background:${clr}"></div></div>
        <div class="big-prog-pct" id="bpp">${pct}%</div>
      </div>
      <div class="slider-row">
        <label>Set completion:</label>
        <input type="range" min="0" max="100" value="${pct}" oninput="onSlider(this.value)">
        <span id="sv" style="font-size:.85rem;font-weight:700;color:var(--text2);min-width:38px">${pct}%</span>
      </div>
      <div class="donut-wrap"><canvas id="donut-c"></canvas></div>
    </div>`;
  CI.donut=new Chart(document.getElementById('donut-c'),{
    type:'doughnut',
    data:{ datasets:[{ data:[pct,100-pct], backgroundColor:[p.status==='completed'?'#22c55e':p.status==='unfinished'?'#ef4444':accentColor,'#e2e8f0'], borderWidth:0, hoverOffset:0 }] },
    options:{ cutout:'74%', plugins:{ legend:{display:false}, tooltip:{enabled:false} }, animation:{animateRotate:true} }
  });
}
function onSlider(v){
  v=parseInt(v);
  document.getElementById('bpp').textContent=v+'%';
  document.getElementById('sv').textContent=v+'%';
  document.getElementById('bpf').style.width=v+'%';
  const p=getP(S.curId); if(!p) return;
  p.progress=v; save();
  const c=CI.donut;
  if(c){
    c.data.datasets[0].data=[v,100-v];
    c.data.datasets[0].backgroundColor[0]=p.status==='completed'?'#22c55e':p.status==='unfinished'?'#ef4444':accentColor;
    c.update();
  }
}

// ── BURNDOWN ──
function drawBurndown(p,area){
  const logs=(p.burndownLog||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const total=p.totalPoints||100;
  area.innerHTML=`
    <div class="bd-controls">
      <div class="fg"><label>Total work points</label><input type="number" id="bdtotal" value="${total}" min="1" style="width:100px" onchange="setBdTotal(this.value)"></div>
      <div style="border-left:1px solid var(--border);padding-left:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div class="fg"><label>Date</label><input type="date" id="bddate" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="fg"><label>Remaining</label><input type="number" id="bdrem" min="0" placeholder="e.g. 75" style="width:90px"></div>
        <button class="btn btn-primary btn-sm" onclick="addBdLog()">Log</button>
      </div>
    </div>
    <div class="bd-chart-wrap"><canvas id="bd-c"></canvas></div>
    ${logs.length?`<div class="bd-table"><table>
      <thead><tr><th>Date</th><th>Remaining</th><th>Burned</th><th></th></tr></thead>
      <tbody>${logs.map(l=>`<tr>
        <td>${fmtDate(l.date)}</td>
        <td>${l.remaining}</td>
        <td>${total-l.remaining>=0?total-l.remaining:'—'}</td>
        <td><button class="del-btn" onclick="delBdLog('${l.id}')">✕</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`:''}
  `;
  buildBdChart(p);
}
function buildBdChart(p){
  const logs=(p.burndownLog||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const total=p.totalPoints||100;
  const start=p.createdAt||new Date().toISOString().slice(0,10);
  const end=p.dueDate||new Date(Date.now()+30*864e5).toISOString().slice(0,10);
  const s0=new Date(start), e0=new Date(end);
  const rangeDays=Math.max(1,(e0-s0)/864e5);
  let labels,ideal,actual;
  if(logs.length){
    labels=logs.map(l=>fmtDate(l.date));
    actual=logs.map(l=>l.remaining);
    ideal=logs.map(l=>{
      const dp=Math.max(0,(new Date(l.date)-s0)/864e5);
      return Math.max(0,Math.round(total-total*dp/rangeDays));
    });
  } else {
    labels=[fmtDate(start),fmtDate(end)];
    ideal=[total,0];
    actual=null;
  }
  if(CI.bd){ try{CI.bd.destroy();}catch(e){} }
  const datasets=[{
    label:'Ideal',data:ideal,borderColor:'#94a3b8',borderDash:[6,4],borderWidth:2,
    pointRadius:2,fill:false,tension:0
  }];
  if(actual) datasets.push({
    label:'Actual',data:actual,borderColor:accentColor,backgroundColor:hexToRgba(accentColor,.08),
    borderWidth:2.5,pointRadius:4,fill:true,tension:.3
  });
  const cnv=document.getElementById('bd-c');
  if(!cnv) return;
  CI.bd=new Chart(cnv,{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        y:{beginAtZero:true,title:{display:true,text:'Remaining Work',color:'#94a3b8',font:{size:11}},grid:{color:gridColor()}},
        x:{grid:{color:gridColor()}}
      },
      plugins:{legend:{position:'top',labels:{font:{size:11},usePointStyle:true}}}
    }
  });
}
function setBdTotal(v){
  const p=getP(S.curId); if(!p) return;
  p.totalPoints=parseInt(v)||100; save(); buildBdChart(p);
}
function addBdLog(){
  const date=document.getElementById('bddate').value;
  const rem=parseFloat(document.getElementById('bdrem').value);
  if(!date||isNaN(rem)) return;
  const p=getP(S.curId); if(!p) return;
  p.burndownLog=(p.burndownLog||[]).filter(l=>l.date!==date);
  p.burndownLog.push({id:uid(),date,remaining:rem});
  save(); drawBurndown(p,document.getElementById('chart-area'));
}
function delBdLog(lid){
  const p=getP(S.curId); if(!p) return;
  p.burndownLog=(p.burndownLog||[]).filter(l=>l.id!==lid);
  save(); drawBurndown(p,document.getElementById('chart-area'));
}

// ── GANTT ──
function drawGanttArea(p,area){
  area.innerHTML=`
    <div class="gantt-add">
      <div class="fg"><label>Task Name</label><input type="text" id="gt-name" placeholder="e.g. Design phase" style="min-width:160px"></div>
      <div class="fg"><label>Start</label><input type="date" id="gt-start" value="${p.createdAt||new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>End</label><input type="date" id="gt-end" value="${p.dueDate||new Date().toISOString().slice(0,10)}"></div>
      <button class="btn btn-primary btn-sm" style="align-self:flex-end" onclick="addGanttTask()">Add Task</button>
    </div>
    <div id="gantt-wrap"></div>`;
  renderGanttChart(p);
}
function renderGanttChart(p){
  const tasks=p.ganttTasks||[];
  const wrap=document.getElementById('gantt-wrap');
  if(!wrap) return;
  if(!tasks.length){
    wrap.innerHTML=`<div class="gantt-empty">No tasks yet — add a task above to build your timeline.</div>`;
    return;
  }
  const allMs=tasks.flatMap(t=>[new Date(t.startDate).getTime(),new Date(t.endDate).getTime()]).filter(n=>!isNaN(n));
  const minMs=Math.min(...allMs), maxMs=Math.max(...allMs);
  const pad=(maxMs-minMs)*0.04||864e5;
  const rMin=minMs-pad, rMax=maxMs+pad*1.5;
  const range=rMax-rMin;
  const today=Date.now();
  const todayPct=Math.max(0,Math.min(100,((today-rMin)/range)*100));
  const showToday=today>=rMin&&today<=rMax;
  const TICKS=6;
  const ticks=Array.from({length:TICKS+1},(_,i)=>{
    const ts=rMin+(range*i/TICKS);
    const d=new Date(ts);
    return { pct:(i/TICKS)*100, lbl:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) };
  });
  wrap.innerHTML=`
    <div class="gantt-wrap">
      <div class="gantt-head">
        <div class="gantt-lbl-col">Task</div>
        <div class="gantt-time-col">
          ${ticks.map(t=>`<div class="gantt-tick" style="left:${t.pct}%">${t.lbl}</div>`).join('')}
        </div>
      </div>
      ${tasks.map(t=>{
        const s=new Date(t.startDate).getTime(), e=new Date(t.endDate).getTime();
        const left=Math.max(0,((s-rMin)/range)*100);
        const wid=Math.max(0.5,((e-s)/range)*100);
        return `<div class="gantt-row">
          <div class="gantt-row-lbl" onclick="toggleGantt('${t.id}')">
            <span class="chk ${t.completed?'chkd':''}">${t.completed?'✓':''}</span>
            <span style="${t.completed?'text-decoration:line-through;color:var(--text3);':''};font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</span>
          </div>
          <div class="gantt-row-track">
            ${showToday?`<div class="today-ln" style="left:${todayPct}%"></div>`:''}
            <div class="gantt-bar ${t.completed?'done':'active'}" style="left:${left}%;width:${wid}%" title="${esc(t.title)}: ${fmtDate(t.startDate)} → ${fmtDate(t.endDate)}" onclick="rmGanttTask(event,'${t.id}')">
              ${wid>6?esc(t.title):''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="gantt-legend">
      <span><span class="leg-dot" style="background:var(--blue)"></span>Active</span>
      <span><span class="leg-dot" style="background:var(--green)"></span>Done</span>
      ${showToday?`<span><span style="width:2px;height:12px;background:var(--red);display:inline-block;border-radius:1px"></span>Today</span>`:''}
      <span style="margin-left:auto;color:var(--text3);font-size:.72rem">Click label to toggle done · Click bar to delete</span>
    </div>`;
}
function addGanttTask(){
  const name=document.getElementById('gt-name').value.trim();
  const start=document.getElementById('gt-start').value;
  const end=document.getElementById('gt-end').value;
  if(!name||!start||!end) return;
  if(end<start){ alert('End date must be after start date.'); return; }
  const p=getP(S.curId); if(!p) return;
  p.ganttTasks=p.ganttTasks||[];
  p.ganttTasks.push({id:uid(),title:name,startDate:start,endDate:end,completed:false});
  save(); document.getElementById('gt-name').value=''; renderGanttChart(p);
}
function toggleGantt(tid){
  const p=getP(S.curId); if(!p) return;
  const t=p.ganttTasks.find(t=>t.id===tid);
  if(t){ t.completed=!t.completed; save(); renderGanttChart(p); }
}
function rmGanttTask(e,tid){
  e.stopPropagation();
  if(confirm('Remove this task?')){
    const p=getP(S.curId); if(!p) return;
    p.ganttTasks=p.ganttTasks.filter(t=>t.id!==tid);
    save(); renderGanttChart(p);
  }
}

// ── MILESTONES ──
function drawMilestones(p,area){
  const ms=p.milestones||[];
  const done=ms.filter(m=>m.completed).length;
  const pct=ms.length?Math.round(done/ms.length*100):0;
  area.innerHTML=`
    <div>
      ${ms.length?`<div class="ms-prog-row">
        <div class="ms-prog-wrap"><div class="ms-prog-fill" style="width:${pct}%"></div></div>
        <span style="font-size:.82rem;font-weight:700;color:var(--text2);white-space:nowrap">${done}/${ms.length} done</span>
      </div>`:''}
      <div class="ms-add">
        <div class="fg" style="flex:1;min-width:140px"><label>Milestone</label><input type="text" id="ms-name" placeholder="e.g. Design approved"></div>
        <div class="fg"><label>Target Date</label><input type="date" id="ms-date"></div>
        <button class="btn btn-primary btn-sm" style="align-self:flex-end" onclick="addMs()">Add</button>
      </div>
      <div class="ms-list">
        ${ms.length?ms.slice().sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||'')).map(m=>`
          <div class="ms-item ${m.completed?'ms-done':''}">
            <div class="ms-chk ${m.completed?'chkd':''}" onclick="toggleMs('${m.id}')">${m.completed?'✓':''}</div>
            <div class="ms-lbl">${esc(m.title)}</div>
            ${m.dueDate?`<div class="ms-date">${fmtDate(m.dueDate)}</div>`:''}
            <button class="del-btn" onclick="delMs('${m.id}')">✕</button>
          </div>`).join('')
        :`<div class="ms-empty">No milestones yet — add key checkpoints above.</div>`}
      </div>
    </div>`;
}
function addMs(){
  const title=document.getElementById('ms-name').value.trim(); if(!title) return;
  const p=getP(S.curId); if(!p) return;
  p.milestones=p.milestones||[];
  p.milestones.push({id:uid(),title,dueDate:document.getElementById('ms-date').value,completed:false});
  save(); drawMilestones(p,document.getElementById('chart-area'));
}
function toggleMs(mid){
  const p=getP(S.curId); if(!p) return;
  const m=p.milestones.find(m=>m.id===mid);
  if(m){ m.completed=!m.completed; save(); drawMilestones(p,document.getElementById('chart-area')); }
}
function delMs(mid){
  const p=getP(S.curId); if(!p) return;
  p.milestones=p.milestones.filter(m=>m.id!==mid);
  save(); drawMilestones(p,document.getElementById('chart-area'));
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(!document.getElementById('modal-overlay').classList.contains('hidden')) closeModal();
    else if(S.curId) closeDetail();
  }
});

// ── ACCENT COLOR ──
function applyAccent(hex){
  accentColor=hex;
  let s=document.getElementById('accent-style');
  if(!s){s=document.createElement('style');s.id='accent-style';document.head.appendChild(s);}
  s.textContent=`:root{--blue:${hex};--blue-lt:${hexToRgba(hex,.12)}}body.dark{--blue-lt:${hexToRgba(hex,.18)}}`;
  const dot=document.getElementById('color-btn-dot');
  if(dot) dot.style.background=hex;
  if(S.curId){destroyCharts();renderChartArea(getP(S.curId));}
}
function loadAccent(){
  const saved=localStorage.getItem('pt-accent')||'#3b82f6';
  applyAccent(saved);
  renderColorSwatches();
}
function pickColor(hex){
  localStorage.setItem('pt-accent',hex);
  applyAccent(hex);
  renderColorSwatches();
}
function renderColorSwatches(){
  const wrap=document.getElementById('color-swatches'); if(!wrap) return;
  wrap.innerHTML=PRESETS.map(c=>`<div class="color-swatch ${accentColor.toLowerCase()===c.h?'sel':''}" style="background:${c.h}" title="${c.n}" onclick="pickColor('${c.h}')"></div>`).join('');
  const ci=document.getElementById('custom-color'); if(ci) ci.value=accentColor;
}
function toggleColorPicker(e){
  e.stopPropagation();
  const pop=document.getElementById('color-popover');
  const opening=pop.classList.toggle('hidden')===false;
  if(opening) renderColorSwatches();
}
document.addEventListener('click',()=>{
  const pop=document.getElementById('color-popover');
  if(pop) pop.classList.add('hidden');
});

// ── THEME ──
function loadTheme(){
  const dark=localStorage.getItem('pt-dark')==='1';
  document.body.classList.toggle('dark',dark);
  document.getElementById('theme-icon-moon').style.display=dark?'none':'';
  document.getElementById('theme-icon-sun').style.display=dark?'':'none';
}
function toggleTheme(){
  const isDark=document.body.classList.toggle('dark');
  localStorage.setItem('pt-dark',isDark?'1':'0');
  document.getElementById('theme-icon-moon').style.display=isDark?'none':'';
  document.getElementById('theme-icon-sun').style.display=isDark?'':'none';
  if(S.curId) renderChartArea(getP(S.curId));
}
function gridColor(){ return document.body.classList.contains('dark')?'#334155':'#f1f5f9'; }

// ── INIT ──
load();
loadTheme();
loadAccent();
renderList();
</script>
